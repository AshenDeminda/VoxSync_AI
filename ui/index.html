<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxSync AI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background-color: #1e1e1e; padding: 20px; border-radius: 10px; width: 100%; max-width: 600px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #4CAF50; }
        .section { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #333; }
        label { font-weight: bold; display: block; margin-bottom: 10px; color: #aaa;}
        button { background-color: #4CAF50; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; margin-right: 10px;}
        button:hover { background-color: #45a049; }
        button:disabled { background-color: #555; cursor: not-allowed; }
        #chat-box { background-color: #2c2c2c; padding: 15px; border-radius: 5px; min-height: 100px; margin-bottom: 15px; font-size: 14px; line-height: 1.5;}
        .user-msg { color: #82b1ff; margin-bottom: 10px; }
        .ai-msg { color: #b9f6ca; margin-bottom: 10px; }
        #status { color: #ffeb3b; font-size: 14px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎙️ VoxSync AI</h1>

    <div class="section">
        <label>1. Upload Voice to Clone (10-15s .wav)</label>
        <input type="file" id="ref-audio" accept="audio/wav, audio/mpeg">
    </div>

    <div class="section">
        <label>2. Talk to VoxSync</label>
        <button id="record-btn">Start Recording</button>
        <button id="stop-btn" disabled>Stop & Send</button>
        <span id="status">Waiting...</span>
    </div>

    <div class="section">
        <label>Conversation</label>
        <div id="chat-box"></div>
        <audio id="audio-player" controls style="width: 100%; display: none; margin-top: 10px;"></audio>
    </div>
</div>

<script>
    let mediaRecorder;
    let audioChunks = [];
    
    const recordBtn = document.getElementById('record-btn');
    const stopBtn = document.getElementById('stop-btn');
    const statusTxt = document.getElementById('status');
    const chatBox = document.getElementById('chat-box');
    const audioPlayer = document.getElementById('audio-player');
    const refAudioInput = document.getElementById('ref-audio');

    // Handle Microphone Recording
    recordBtn.addEventListener('click', async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            
            mediaRecorder.ondataavailable = event => {
                audioChunks.push(event.data);
            };

            mediaRecorder.onstop = sendToBackend;

            audioChunks = [];
            mediaRecorder.start();
            recordBtn.disabled = true;
            stopBtn.disabled = false;
            statusTxt.innerText = "🔴 Recording...";
        } catch (err) {
            alert("Microphone access denied or not available.");
        }
    });

    stopBtn.addEventListener('click', () => {
        mediaRecorder.stop();
        recordBtn.disabled = false;
        stopBtn.disabled = true;
        statusTxt.innerText = "⏳ Processing (STT -> LLM -> TTS)...";
    });

    // Send audio to the FastAPI backend
    async function sendToBackend() {
        if (!refAudioInput.files[0]) {
            alert("Please upload a reference voice file first!");
            statusTxt.innerText = "Waiting...";
            return;
        }

        const mimeType = (mediaRecorder && mediaRecorder.mimeType) ? mediaRecorder.mimeType : 'audio/webm';
        const micBlob = new Blob(audioChunks, { type: mimeType });
        const ext = mimeType.includes('ogg') ? 'ogg'
              : mimeType.includes('webm') ? 'webm'
              : mimeType.includes('mp4') ? 'mp4'
              : 'bin';
        const formData = new FormData();
        
        formData.append("mic_audio", micBlob, `mic_input.${ext}`);
        formData.append("ref_audio", refAudioInput.files[0]);

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                body: formData
            });

            let data;
            try {
                data = await response.json();
            } catch {
                data = null;
            }

            if (!response.ok) {
                const detail = (data && data.detail) ? data.detail : `Request failed (${response.status})`;
                statusTxt.innerText = `❌ ${detail}`;
                return;
            }
            
            // Update Chat Box
            chatBox.innerHTML += `<div class="user-msg"><strong>You:</strong> ${data.user_text}</div>`;
            chatBox.innerHTML += `<div class="ai-msg"><strong>VoxSync:</strong> ${data.ai_text}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            // Play the cloned audio response
            audioPlayer.src = data.audio_url;
            audioPlayer.style.display = "block";
            audioPlayer.play();

            statusTxt.innerText = "✅ Done!";
        } catch (error) {
            console.error(error);
            statusTxt.innerText = "❌ Error processing request.";
        }
    }
</script>

</body>
</html>
